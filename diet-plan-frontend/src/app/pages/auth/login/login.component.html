<div class="auth-page">
  <div class="auth-card card fade-in-up">
    <div class="auth-header">
      <span class="auth-logo">🥗</span>
      <h1>Welcome back</h1>
      <p>Sign in to your NutriPlan account</p>
    </div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-input" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing in…</span>
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
  <div class="auth-bg"></div>
</div>
