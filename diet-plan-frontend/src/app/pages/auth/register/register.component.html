<div class="auth-page">
  <div class="auth-card card fade-in-up">
    <div class="auth-header">
      <span class="auth-logo">🥗</span>
      <h1>Create account</h1>
      <p>Start your NutriPlan journey today</p>
    </div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" formControlName="name" class="form-input" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--text-muted);font-weight:400">(min 6 chars)</span></label>
        <input type="password" formControlName="password" class="form-input" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading">Creating…</span>
      </button>
    </form>
    <p class="auth-footer">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
  <div class="auth-bg"></div>
</div>
