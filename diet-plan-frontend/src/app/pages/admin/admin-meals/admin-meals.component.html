<div class="page fade-in">
  <div class="admin-header">
    <div>
      <div class="page-title">⚙️ Admin — Meal Management</div>
      <div class="page-sub">Create, edit and delete meals from the library.</div>
    </div>
    <button class="btn btn-primary" (click)="openCreate()">+ Add Meal</button>
  </div>

  <!-- Meal Form -->
  <div class="card admin-form fade-in-up" *ngIf="showForm">
    <h3>{{ editing ? 'Edit Meal' : 'New Meal' }}</h3>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input class="form-input" [(ngModel)]="form.name" placeholder="Meal name" />
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-input form-select" [(ngModel)]="form.category">
          <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" [(ngModel)]="form.description" placeholder="Brief description…" />
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input class="form-input" [(ngModel)]="form.imageUrl" placeholder="https://…" />
    </div>
    <div class="grid-4">
      <div class="form-group">
        <label class="form-label">Calories (kcal)</label>
        <input type="number" class="form-input" [(ngModel)]="form.calories" />
      </div>
      <div class="form-group">
        <label class="form-label">Protein (g)</label>
        <input type="number" class="form-input" [(ngModel)]="form.proteinG" />
      </div>
      <div class="form-group">
        <label class="form-label">Carbs (g)</label>
        <input type="number" class="form-input" [(ngModel)]="form.carbsG" />
      </div>
      <div class="form-group">
        <label class="form-label">Fat (g)</label>
        <input type="number" class="form-input" [(ngModel)]="form.fatG" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" (click)="save()" [disabled]="!form.name">
        {{ editing ? 'Update Meal' : 'Create Meal' }}
      </button>
    </div>
  </div>

  <div class="spinner-wrap" *ngIf="loading"><div class="spinner"></div></div>

  <!-- Meals table -->
  <div class="card admin-table-wrap" *ngIf="!loading">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Image</th><th>Name</th><th>Category</th>
          <th>Calories</th><th>Protein</th><th>Carbs</th><th>Fat</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of meals">
          <td><img [src]="m.imageUrl || 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=80'"
                   class="admin-img" [alt]="m.name" /></td>
          <td class="meal-name-cell">{{ m.name }}</td>
          <td><span [class]="'chip chip-' + m.category.toLowerCase()">{{ m.category }}</span></td>
          <td><strong>{{ m.calories }}</strong></td>
          <td>{{ m.proteinG }}g</td>
          <td>{{ m.carbsG }}g</td>
          <td>{{ m.fatG }}g</td>
          <td class="action-cell">
            <button class="btn btn-secondary btn-sm" (click)="openEdit(m)">Edit</button>
            <button class="btn btn-danger btn-sm"    (click)="delete(m.id!)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty-state" *ngIf="meals.length === 0">
      <div class="icon">🍽️</div><h3>No meals found</h3>
    </div>
  </div>
</div>
