<div class="page fade-in">
  <div class="plans-header">
    <div>
      <div class="page-title">📋 My Diet Plans</div>
      <div class="page-sub">Manage and build your weekly meal plans.</div>
    </div>
    <button class="btn btn-primary" (click)="showCreate = true">+ New Plan</button>
  </div>

  <!-- Create form -->
  <div class="card create-form fade-in-up" *ngIf="showCreate">
    <h3>Create New Plan</h3>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Plan Name *</label>
        <input class="form-input" [(ngModel)]="newPlan.name" placeholder="e.g. Weight Loss Week 1" />
      </div>
      <div class="form-group">
        <label class="form-label">Goal</label>
        <select class="form-input form-select" [(ngModel)]="newPlan.goal">
          <option value="">Select goal…</option>
          <option *ngFor="let g of goals" [value]="g">{{ g }}</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" [(ngModel)]="newPlan.description" placeholder="Optional description…" />
    </div>
    <div class="form-group">
      <label class="form-label">Start Date</label>
      <input type="date" class="form-input" [(ngModel)]="newPlan.startDate" />
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" (click)="showCreate = false">Cancel</button>
      <button class="btn btn-primary" (click)="create()" [disabled]="!newPlan.name || creating">
        {{ creating ? 'Creating…' : 'Create Plan' }}
      </button>
    </div>
  </div>

  <div class="spinner-wrap" *ngIf="loading"><div class="spinner"></div></div>

  <!-- Plans grid -->
  <div class="grid-3 fade-in" *ngIf="!loading">
    <div class="plan-card card" *ngFor="let p of plans" (click)="viewPlan(p.id!)">
      <div class="plan-goal-badge" *ngIf="p.goal">{{ p.goal }}</div>
      <h3 class="plan-name">{{ p.name }}</h3>
      <p class="plan-desc" *ngIf="p.description">{{ p.description }}</p>
      <div class="plan-meta">
        <span>🍽️ {{ p.meals.length }} meals</span>
        <span>🔥 {{ p.totalCalories }} kcal total</span>
      </div>
      <div class="plan-footer">
        <span class="plan-date" *ngIf="p.startDate">📅 {{ p.startDate }}</span>
        <button class="btn btn-danger btn-sm" (click)="deletePlan(p.id!, $event)">Delete</button>
      </div>
    </div>
    <div class="empty-state" *ngIf="plans.length === 0" style="grid-column:1/-1">
      <div class="icon">📋</div>
      <h3>No plans yet</h3>
      <p>Create your first diet plan to get started.</p>
    </div>
  </div>
</div>
